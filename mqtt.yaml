# this is the config for the homeassistant configuration.yaml

mqtt:
  binary_sensor:
    - name: "Alarm Armed"
      unique_id: alarm_armed_sensor
      state_topic: "home/alarm/armed"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: safety

    - name: "Alarm Triggered"
      unique_id: alarm_triggered_sensor
      state_topic: "home/alarm/alarm"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: safety

    - name: "Hallway pir"
      unique_id: hallway_pir_sensor
      state_topic: "home/alarm/hallway"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: motion

    - name: "Kitchen pir"
      unique_id: Kitchen_pir_sensor
      state_topic: "home/alarm/kitchen"
      payload_on: "ON"
      payload_off: "OFF"
      device_class: motion
